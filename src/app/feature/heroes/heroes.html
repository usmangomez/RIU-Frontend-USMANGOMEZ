@if(loading() && heroes().length === 0) {
  <div class="heroes__loading">Loading...</div>
} @else {
  <div class="heroes">
    <div class="heroes__top-tools">
      <button matButton="filled" (click)="handleAddHero()">Add hero</button>
      <mat-form-field [formGroup]="form">
        <mat-label>Search hero</mat-label>
        <input matInput formControlName="search">
      </mat-form-field>
    </div>

    @if(loading() && heroes().length > 0) {
      <div class="heroes__loading">Loading...</div>
    } @else {<div class="heroes__content">
      @for (hero of heroes(); track hero.id) {
        <app-hero-card [hero]="hero" (click)="handleClickHero(hero.id)" />
      } @empty {
        <div class="heroes__content__no-results">No results found with: {{searchValue()}}</div>
      }
    </div>
    }


    <div class="heroes__bottom-tools">
      <mat-paginator
        [length]="totalHeroItems()"
        [pageSize]="10"
        [pageSizeOptions]="[10, 20, 30]"
        aria-label="Select page"
        (page)="handlePaginatorChange($event)"
      >
      </mat-paginator>
    </div>
  </div>
}
